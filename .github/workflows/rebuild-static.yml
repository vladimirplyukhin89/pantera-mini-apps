# Пересборка статического фронта и опциональная выкладка на Beget (FTP или SSH/rsync).
# Запуск: GitHub → Actions → «Rebuild static site» (workflow_dispatch)
#   или внешний POST .../dispatches с event_type: strapi_publish (см. docs/strapi-cloud-to-beget.md).
#
# Чтобы после сборки автоматически выкладывать файлы на Beget:
#   Settings → Variables: BEGET_FTP_DEPLOY = true
#   и либо секреты BEGET_FTP_* (FTP), либо BEGET_DEPLOY_METHOD = ssh и секреты BEGET_SSH_* (см. docs/github-actions-beget-autodeploy.md).

name: Rebuild static site

on:
  repository_dispatch:
    types: [strapi_publish]
  workflow_dispatch:
  # Ежедневная пересборка: planned/past в слайдере считаются при SSG — без нового билда после полуночи блоки не обновятся.
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: rebuild-static-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: astro-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: astro-app/package-lock.json

      - run: npm ci

      - name: Build Astro (SSG)
        run: npm run build
        env:
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
          STRAPI_TOKEN: ${{ secrets.STRAPI_TOKEN }}

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist
          path: astro-app/dist/

  deploy:
    needs: build
    if: vars.BEGET_DEPLOY == 'true' || vars.BEGET_FTP_DEPLOY == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: astro-dist
          path: dist

      - name: Set up SSH
        if: vars.BEGET_DEPLOY_METHOD == 'ssh'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BEGET_SSH_KEY }}

      - name: Deploy to Beget (SSH / rsync)
        if: vars.BEGET_DEPLOY_METHOD == 'ssh'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.BEGET_SSH_HOST }}" >> ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -o BatchMode=yes -o StrictHostKeyChecking=yes" \
            ./dist/ \
            "${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}:${{ secrets.BEGET_SSH_REMOTE_DIR }}"

      - name: Deploy to Beget (FTP)
        if: vars.BEGET_DEPLOY_METHOD != 'ssh'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BEGET_FTP_HOST }}
          username: ${{ secrets.BEGET_FTP_USER }}
          password: ${{ secrets.BEGET_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.BEGET_FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
